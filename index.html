<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creator Store</title>
  <meta name="description" content="크리에이터가 강의와 상품을 판매하는 커머스 플랫폼" />
  <link rel="preconnect" href="https://yt3.googleusercontent.com" />
  <link rel="preconnect" href="https://i.ytimg.com" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <a class="skip" href="#view">본문 바로가기</a>
  <!-- ── header ─────────────────────────────────────────── -->
  <header class="hd" id="hd">
    <div class="hd__bar wrap">
      <button class="hd__burger" id="burger" aria-label="메뉴 열기" aria-expanded="false" aria-controls="mmenu">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <a class="hd__logo" href="#/" data-brand-name>Creator</a>
      <nav class="hd__nav" id="nav"></nav>
      <div class="hd__actions">
        <form class="hd__search" id="search">
          <input type="search" placeholder="강의 · 상품 검색" aria-label="검색" />
        </form>
        <button class="hd__icon" id="loginBtn" title="로그인">로그인</button>
        <button class="hd__cart" id="cartBtn" title="장바구니" aria-label="장바구니">
          <span class="hd__cart-ico" aria-hidden="true"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2 3h2.2l2 12.4a1.6 1.6 0 0 0 1.6 1.3h9.3a1.6 1.6 0 0 0 1.6-1.3L21 7H5.2"/></svg></span>
          <span class="hd__cart-badge" id="cartBadge" hidden>0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ── mobile menu drawer (toggled by #burger) ──────────── -->
  <div class="mmenu" id="mmenu" hidden>
    <div class="mmenu__backdrop" data-mclose></div>
    <nav class="mmenu__panel" aria-label="메뉴">
      <div class="mmenu__head">
        <a class="mmenu__logo" href="#/" data-brand-name data-mclose>Creator</a>
        <button class="mmenu__close" data-mclose aria-label="메뉴 닫기">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
        </button>
      </div>
      <div class="mmenu__links" id="mmenuLinks"></div>
      <div class="mmenu__foot">
        <button class="btn btn--ghost btn--block" id="mLogin">로그인</button>
      </div>
    </nav>
  </div>

  <!-- ── main view ──────────────────────────────────────── -->
  <main id="view" aria-busy="true">
    <div class="loading"><div class="spinner"></div></div>
  </main>

  <!-- ── footer (rendered by app.js renderFooter) ─────────── -->
  <footer class="ft" id="ft"></footer>

  <!-- ── cart drawer ────────────────────────────────────── -->
  <div class="drawer" id="drawer" hidden>
    <div class="drawer__backdrop" data-close></div>
    <aside class="drawer__panel" role="dialog" aria-modal="true" aria-label="장바구니">
      <div class="drawer__head">
        <h2>장바구니</h2>
        <button class="drawer__close" data-close aria-label="닫기">✕</button>
      </div>
      <div class="drawer__body" id="drawerBody"></div>
      <div class="drawer__foot" id="drawerFoot"></div>
    </aside>
  </div>

  <!-- ── video / preview modal ──────────────────────────── -->
  <div class="modal" id="modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__dialog" role="dialog" aria-modal="true">
      <button class="modal__close" data-close aria-label="닫기">✕</button>
      <div class="modal__player" id="modalPlayer"></div>
    </div>
  </div>

  <!-- ── toast ──────────────────────────────────────────── -->
  <div class="toasts" id="toasts" aria-live="polite"></div>

  <!-- scripts: plain globals so the page also works on file:// -->
  <script src="./js/config.js"></script>
  <script src="./js/data.js"></script>
  <script src="./js/format.js"></script>
  <script src="./js/store.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/runmoa-checkout.js"></script>
  <script src="./js/components.js"></script>
  <script src="./js/views.js"></script>
  <script src="./js/router.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
